# Default values for aigc.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: 636957932458.dkr.ecr.ap-northeast-1.amazonaws.com/devops/opspilot/ops-aigc
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v20251212-main"

imagePullSecrets: []
nameOverride: "aigc-service"
fullnameOverride: "aigc-service"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resourcesPreset: "medium"
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}


extraEnvVars:
  - name: ENV
    value: "pd-tw"
  - name: APP
    value: "api"
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: SQL_ADVISORY_MCP_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: sql-advisory-mcp-access-key
        key: SQL_ADVISORY_MCP_ACCESS_KEY
  - name: CMS_METRICS_MCP_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: cms-metrics-mcp-access-key
        key: CMS_METRICS_MCP_ACCESS_KEY
  - name: WATCH_API_MCP_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: watch-api-mcp-access-key
        key: WATCH_API_MCP_ACCESS_KEY
  - name: SERVICE_CONFIG_MCP_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: service-config-mcp-access-key
        key: SERVICE_CONFIG_MCP_ACCESS_KEY
  - name: ALI_SLOWLOG_MCP_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: ali-slowlog-mcp-access-key
        key: ALI_SLOWLOG_MCP_ACCESS_KEY
  - name: SW_AGENT_COLLECTOR_BACKEND_SERVICES
    value: "skywalking-oap.skywalking.svc:11800"
  - name: SW_AGENT_NAME
    value: "pd@opspilot::aigc-service"